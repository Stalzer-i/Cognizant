<h1>{{ portalName }}</h1>
<p>Browse courses, track your enrollment, and check your grades all in one place.</p>
<div class="stats-row">
  <span>Courses Available: 12</span>
  <span>Enrolled: 3</span>
  <span>GPA: 3.8</span>
</div>

<button [disabled]="!isPortalActive" (click)="onEnrollClick()">Enroll Now</button>
<p>{{ message }}</p>

<input name="searchTerm" [(ngModel)]="searchTerm" placeholder="Search courses">
<p>Searching for: {{ searchTerm }}</p>
